<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded square background -->
  <rect width="100" height="100" rx="18" fill="#1D2330"/>

  <!-- D letterform: left bar + right curve -->
  <path d="M 14 26 L 14 74 C 14 74 52 74 52 50 C 52 26 14 26 14 26"
        stroke="#EDE8E0" stroke-width="6" fill="none"
        stroke-linejoin="round" stroke-linecap="square"/>

  <!-- P letterform: vertical bar -->
  <line x1="61" y1="26" x2="61" y2="74"
        stroke="#EDE8E0" stroke-width="6" stroke-linecap="square"/>

  <!-- P letterform: bowl on upper half -->
  <path d="M 61 26 C 61 26 87 26 87 44 C 87 62 61 62 61 62"
        stroke="#EDE8E0" stroke-width="6" fill="none"
        stroke-linejoin="round" stroke-linecap="square"/>
</svg>
